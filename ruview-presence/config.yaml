# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: RuView WiFi Presence
version: "1.0.0"
slug: ruview-presence
description: WiFi-based human presence detection using RSSI. No camera or extra hardware needed — uses the Pi's built-in WiFi card.
url: "https://github.com/zutlik/ha-addons/tree/main/ruview-presence"
arch:
  - aarch64
  - amd64
init: false
host_network: true
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "RuView Web UI and REST API"
options:
  CSI_SOURCE: "wifi"
schema:
  CSI_SOURCE: "str"
restart_policy: unless-stopped
image: "ruvnet/wifi-densepose:latest"
