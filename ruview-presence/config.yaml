# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: RuView WiFi Presence
version: "1.0.11"
slug: ruview-presence
description: >-
  WiFi-based human presence detection using DensePose. Runs fully on the Pi.
  Use 'simulate' for immediate working sensors, or 'esp32' for real CSI sensing
  with an ESP32 module (see RuView docs). Native Linux WiFi scanning is not yet
  implemented in the upstream binary.
url: "https://github.com/zutlik/ha-addons/tree/main/ruview-presence"
arch:
  - aarch64
  - amd64
init: false
host_network: true
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "RuView Web UI and REST API"
options:
  CSI_SOURCE: "simulate"
schema:
  # Renders as a dropdown in the addon Configuration tab
  # simulate = synthetic data — all HA sensors work, no extra hardware needed (recommended for Pi)
  # esp32    = real CSI data from an ESP32 module connected over UDP (port 5005)
  # wifi     = Windows-only netsh probe — falls back to simulate on Linux
  CSI_SOURCE: "list(simulate|esp32|wifi)"
restart_policy: unless-stopped
map:
  - config:rw  # gives the addon write access to /config so it can drop the sensors package
