# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: RuView WiFi Presence
version: "1.0.5"
slug: ruview-presence
description: WiFi-based human presence detection using RSSI. No camera or extra hardware needed — uses the Pi's built-in WiFi card.
url: "https://github.com/zutlik/ha-addons/tree/main/ruview-presence"
arch:
  - aarch64
  - amd64
init: false
host_network: true
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "RuView Web UI and REST API"
options:
  CSI_SOURCE: "wifi"
schema:
  # Renders as a dropdown in the addon Configuration tab
  # wifi     = use Pi's built-in WiFi RSSI (real presence detection, no extra hardware)
  # simulate = synthetic data, useful for testing HA sensors without hardware
  # auto     = try ESP32 hardware first, fall back to simulate
  CSI_SOURCE: "list(wifi|simulate|auto)"
restart_policy: unless-stopped
map:
  - config:rw  # gives the addon write access to /config so it can drop the sensors package
