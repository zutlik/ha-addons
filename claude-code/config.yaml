# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Claude Code
version: "v1.1.0"
slug: claude-code
description: "Run Claude Code as a persistent AI agent with Telegram and remote control"
url: "https://github.com/zutlik/ha-addons/tree/main/claude-code"
arch:
  - aarch64
  - amd64
init: false

# Ingress proxies the ttyd terminal through HA's own web server (no port mapping needed)
# ingress_stream: true is required for WebSocket (ttyd uses WS for the terminal)
ingress: true
ingress_port: 7681
ingress_stream: true

map:
  - share:rw

options:
  TELEGRAM_BOT_TOKEN: ""
  WORK_DIR: "/share/claude-workspace"
  AUTO_UPDATE_CHECK: true

schema:
  TELEGRAM_BOT_TOKEN: "str?"
  WORK_DIR: "str?"
  AUTO_UPDATE_CHECK: "bool?"

# SETUID + SETGID are required so run.sh can use `su claude` to drop
# privileges before invoking claude (--dangerously-skip-permissions
# refuses to run as root).
capabilities:
  - SETUID
  - SETGID
